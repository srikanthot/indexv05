name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: function_app/requirements.txt

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r function_app/requirements.txt

      - name: Unit tests
        run: python tests/test_unit.py

      - name: E2E simulator
        run: python tests/test_e2e_simulator.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff==0.5.6
      - run: ruff check function_app tests scripts
