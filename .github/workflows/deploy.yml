name: Deploy

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      run_indexer:
        description: 'Trigger indexer run after deploy'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install deploy deps
        run: pip install azure-identity httpx

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: |
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg >/dev/null
          echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/dotnetdev.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Deploy
        env:
          LOCATION: eastus2
        run: |
          chmod +x scripts/deploy.sh
          if [ "${{ inputs.run_indexer }}" = "true" ]; then
            scripts/deploy.sh ${{ inputs.env }} --run-indexer
          else
            scripts/deploy.sh ${{ inputs.env }}
          fi
