name: Deploy

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      run_indexer:
        description: 'Trigger indexer run after deploy'
        type: boolean
        default: true
      smoke:
        description: 'Run post-deploy smoke test'
        type: boolean
        default: true

concurrency:
  group: deploy-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  # ---------- Release gate: CI must pass on the exact SHA being deployed ----------
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: function_app/requirements.txt

      - run: pip install -r function_app/requirements.txt ruff==0.5.6

      - name: Unit tests (mandatory gate)
        run: python tests/test_unit.py

      - name: E2E simulator (mandatory gate)
        run: python tests/test_e2e_simulator.py

      - name: Lint (mandatory gate)
        run: ruff check function_app scripts

      - name: Bicep build (mandatory gate)
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep
          bicep build infra/main.bicep --stdout > /dev/null

  # ---------- Actual deploy ----------
  deploy:
    needs: gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install deploy deps
        run: pip install azure-identity httpx

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: |
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg >/dev/null
          echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/dotnetdev.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Deploy
        env:
          LOCATION: eastus2
        run: |
          chmod +x scripts/deploy.sh
          args="${{ inputs.env }}"
          ${{ inputs.run_indexer && 'args="$args --run-indexer"' || '' }}
          ${{ inputs.smoke && 'args="$args --smoke"' || '' }}
          scripts/deploy.sh $args
